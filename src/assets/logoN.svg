<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7a18; stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff3cac; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a5cff; stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main rounded square -->
  <rect x="30" y="40" width="90" height="90" rx="20" ry="20"
        fill="none" stroke="url(#grad1)" stroke-width="4"/>

  <!-- Background square -->
  <rect x="50" y="20" width="90" height="90" rx="20" ry="20"
        fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.4"/>

  <!-- Mountain line -->
  <polyline points="45,100 70,75 90,95 110,80"
            fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>

  <!-- Sun -->
  <circle cx="95" cy="65" r="6" fill="url(#grad1)" />

  <!-- Share icon -->
  <circle cx="145" cy="95" r="6" fill="url(#grad1)" />
  <circle cx="165" cy="80" r="6" fill="url(#grad1)" />
  <circle cx="165" cy="110" r="6" fill="url(#grad1)" />
  <line x1="145" y1="95" x2="165" y2="80" stroke="url(#grad1)" stroke-width="3"/>
  <line x1="145" y1="95" x2="165" y2="110" stroke="url(#grad1)" stroke-width="3"/>
</svg>
